name: Python Publish
run-name: Python Publish - ${{ inputs.target }}
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - all-x64
          - source
          - macos
          - windows-x64
          - windows-arm64
          - linux-x64
          - linux-arm64
      dry_run:
        description: 'Build distributions without publishing to PyPI'
        required: true
        default: false
        type: boolean
permissions:
  contents: read
jobs:
  release-build-source:
    if: ${{ inputs.target == 'source' || inputs.target == 'all' || inputs.target == 'all-x64' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build release distributions
        run: |
          python -m pip install build
          python -m build --sdist
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists-source
          path: dist/*.tar.gz
          retention-days: 1

  release-build-windows-x64:
    if: ${{ inputs.target == 'windows-x64' || inputs.target == 'all' || inputs.target == 'all-x64' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build wheel
        run: |
          python -m pip install build
          python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists-windows-x64
          path: dist/*.whl
          retention-days: 1

  release-build-windows-arm64:
    if: ${{ inputs.target == 'windows-arm64' || inputs.target == 'all' }}
    runs-on: windows-11-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build wheel
        run: |
          python -m pip install build
          python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists-windows-arm64
          path: dist/*.whl
          retention-days: 1

  release-build-macos:
    if: ${{ inputs.target == 'macos' || inputs.target == 'all' || inputs.target == 'all-x64' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build wheel
        run: |
          python -m pip install build
          python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists-macos
          path: dist/*.whl
          retention-days: 1

  release-build-linux-x64:
    if: ${{ inputs.target == 'linux-x64' || inputs.target == 'all' || inputs.target == 'all-x64' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev
      - name: Build wheel
        run: |
          python -m pip install build
          python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists-linux-x64
          path: dist/*.whl
          retention-days: 1

  release-build-linux-arm64:
    if: ${{ inputs.target == 'linux-arm64' || inputs.target == 'all' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev
      - name: Build wheel
        run: |
          python -m pip install build
          python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists-linux-arm64
          path: dist/*.whl
          retention-days: 1

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build-source
      - release-build-windows-x64
      - release-build-windows-arm64
      - release-build-macos
      - release-build-linux-x64
      - release-build-linux-arm64
    if: ${{ !inputs.dry_run && always() && (needs.release-build-source.result == 'success' || needs.release-build-windows-x64.result == 'success' || needs.release-build-windows-arm64.result == 'success' || needs.release-build-macos.result == 'success' || needs.release-build-linux-x64.result == 'success' || needs.release-build-linux-arm64.result == 'success') }}
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/flut/
    steps:
      - name: Retrieve source distributions
        if: ${{ needs.release-build-source.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: release-dists-source
          path: dist/
      - name: Retrieve windows-x64 distributions
        if: ${{ needs.release-build-windows-x64.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: release-dists-windows-x64
          path: dist/
      - name: Retrieve windows-arm64 distributions
        if: ${{ needs.release-build-windows-arm64.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: release-dists-windows-arm64
          path: dist/
      - name: Retrieve macos distributions
        if: ${{ needs.release-build-macos.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: release-dists-macos
          path: dist/
      - name: Retrieve linux-x64 distributions
        if: ${{ needs.release-build-linux-x64.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: release-dists-linux-x64
          path: dist/
      - name: Retrieve linux-arm64 distributions
        if: ${{ needs.release-build-linux-arm64.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: release-dists-linux-arm64
          path: dist/
      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          packages-dir: dist/